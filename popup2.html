<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        width: 280px;
        font-family: Arial, sans-serif;
        padding: 12px;
        margin: 0;
      }

      h3 {
        margin: 0 0 12px;
      }

      label {
        font-size: 13px;
        display: block;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-bottom: 10px;
      }

      button {
        width: 100%;
        padding: 9px;
        margin-bottom: 8px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #f7f7f7;
        font-size: 14px;
      }

      button:hover {
        background: #eeeeee;
      }

      #autoCollect {
        background: #0a66c2;
        color: white;
        border-color: #0a66c2;
      }

      #stop {
        background: #ffefef;
        border-color: #ffb8b8;
      }

      #status {
        font-size: 13px;
        margin-top: 8px;
        padding: 8px;
        background: #f5f5f5;
        border-radius: 6px;
        word-break: break-word;
      }
    </style>
  </head>

  <body>
    <h3>LinkedIn Collector</h3>

    <label for="pageLimit">Pages to collect</label>
    <input id="pageLimit" type="number" min="1" value="10" />

    <button id="collect">Collect current page</button>
    <button id="autoCollect">Auto collect pages</button>
    <button id="stop">Stop</button>
    <button id="export">Export CSV</button>
    <button id="clear">Clear data</button>

    <div id="status">Ready</div>

    <script src="popup2.js"></script>
  </body>
</html>
